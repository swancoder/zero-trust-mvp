spring:
  application:
    name: service-b
  main:
    web-application-type: reactive

# ── HTTPS server with mTLS ──────────────────────────────────────────────────
# Requires a valid client certificate signed by the ZTE CA.
# Run certs/generate-certs.sh once to generate keystores before starting.
server:
  port: ${SERVER_PORT:8082}
  ssl:
    enabled: true
    key-store: file:${ZTE_CERTS_DIR:./certs}/service-b.p12
    key-store-password: ${ZTE_KEY_PASSWORD:zte-pass}
    key-store-type: PKCS12
    # need = reject connections without a valid client cert
    client-auth: need
    trust-store: file:${ZTE_CERTS_DIR:./certs}/truststore.p12
    trust-store-password: ${ZTE_KEY_PASSWORD:zte-pass}
    trust-store-type: PKCS12

# ── Separate HTTP management port (no client cert required for health probes) ──
management:
  server:
    port: ${MANAGEMENT_PORT:9082}
    ssl:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

# ── OBO token validation — same secret as the gateway ──────────────────────
zte:
  obo:
    secret: ${ZTE_OBO_SECRET:zte-obo-dev-secret-change-in-production}
    expiry-seconds: ${ZTE_OBO_EXPIRY_SECONDS:30}

logging:
  level:
    root: INFO
    com.zte.serviceb: DEBUG
