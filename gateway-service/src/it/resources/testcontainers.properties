# Force Testcontainers to use EnvironmentAndSystemPropertyClientProviderStrategy.
# This strategy calls DefaultDockerClientConfig.createDefaultConfigBuilder().build()
# without overriding the API version, so the JVM system property
# -Ddocker.api.version=1.45 (set in build.gradle.kts integrationTest task) is
# honoured by docker-java.
#
# UnixSocketClientProviderStrategy (the fallback) hardcodes VERSION_1_19, causing
# Docker Desktop on WSL2 to reject the request with HTTP 400 (≥ v1.44 required).
docker.client.strategy=org.testcontainers.dockerclient.EnvironmentAndSystemPropertyClientProviderStrategy
