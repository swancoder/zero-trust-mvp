spring:
  application:
    name: gateway-service

  # ── Database (JDBC — used exclusively by Flyway for schema migrations) ──
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zte_db}
    username: ${DB_USER:zte_user}
    password: ${DB_PASSWORD:zte_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: flyway-pool
      maximum-pool-size: 2   # minimal — only for migrations at startup

  # ── Flyway schema migrations ──
  # Explicit JDBC URL required when spring-boot-starter-data-r2dbc is also on the
  # classpath — Spring Boot 3.4 does not always auto-select the JDBC DataSource for
  # Flyway in a dual JDBC+R2DBC configuration.
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zte_db}
    user: ${DB_USER:zte_user}
    password: ${DB_PASSWORD:zte_pass}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── R2DBC (reactive runtime queries — policy engine) ──
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zte_db}
    username: ${DB_USER:zte_user}
    password: ${DB_PASSWORD:zte_pass}
    pool:
      initial-size: 2
      max-size: 5
      max-idle-time: 30m

  # ── Spring Cloud Gateway: disable default web (use WebFlux) ──
  main:
    web-application-type: reactive

  # ── OAuth2 / JWT (Keycloak) ──
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak OIDC discovery endpoint — Gateway validates JWTs locally via JWKS
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/zte-realm}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/zte-realm/protocol/openid-connect/certs}

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: when-authorized

# ── Gateway ──
spring.cloud.gateway:
  # Disable default route discovery — routes are defined in GatewayRouteConfig
  discovery:
    locator:
      enabled: false
  # Forward the original Host header to downstream services
  forwarded-headers-strategy: FRAMEWORK

server:
  port: ${SERVER_PORT:8080}

# ── Downstream services ──
service-a:
  uri: ${SERVICE_A_URI:https://localhost:8081}
service-b:
  uri: ${SERVICE_B_URI:https://localhost:8082}

# ── mTLS outbound (gateway → service-a / service-b) ──
zte:
  mtls:
    certs-dir: ${ZTE_CERTS_DIR:./certs}
    key-password: ${ZTE_KEY_PASSWORD:zte-pass}
    refresh-interval-ms: 300000   # check keystore file every 5 min; hot-swap if changed

  # ── On-behalf-of token (X-ZTE-User-Context) ──
  obo:
    secret: ${ZTE_OBO_SECRET:zte-obo-dev-secret-change-in-production}
    expiry-seconds: ${ZTE_OBO_EXPIRY_SECONDS:30}

# ── Logging ──
logging:
  level:
    root: INFO
    com.zte: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: INFO
