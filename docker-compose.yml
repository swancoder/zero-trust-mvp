version: "3.9"

# ============================================================
# ZTE-Lightweight — Local Development Infrastructure
# ============================================================
# Services:
#   postgres  — Primary database (port 5432)
#   keycloak  — OIDC provider in dev mode (port 8180)
#
# Usage:
#   docker compose up -d
#   ./setup-env.sh          ← verifies containers are healthy
# ============================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: zte-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       zte_db
      POSTGRES_USER:     zte_user
      POSTGRES_PASSWORD: zte_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zte_user -d zte_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - zte-net

  # ── Keycloak (dev mode — NOT for production) ─────────────
  # Realm bootstrap: on first start, Keycloak imports keycloak/realm-export.json
  # which creates zte-realm, zte-gateway client, ADMIN/USER roles, and zte-admin user.
  # NOTE: --import-realm skips import if the realm already exists in the DB.
  #       Run `docker compose down` (not just restart) to get a clean re-import.
  # NOTE: zte-admin is created without a password. After startup, run:
  #       ./scripts/set-keycloak-password.sh
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: zte-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB:                     dev-file   # H2 file DB — container-local, reset on `down`
      KEYCLOAK_ADMIN:            admin
      KEYCLOAK_ADMIN_PASSWORD:   admin
      KC_HTTP_PORT:              8080
      KC_HOSTNAME_STRICT:        "false"
      KC_HOSTNAME_STRICT_HTTPS:  "false"
      KC_LOG_LEVEL:              INFO
    ports:
      - "8180:8080"    # expose on 8180 to avoid conflict with gateway (8080)
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - zte-net

  # ── Service A (demo protected downstream service) ────────
  service-a:
    build:
      context: .
      dockerfile: service-a/Dockerfile
    container_name: zte-service-a
    restart: unless-stopped
    environment:
      ZTE_CERTS_DIR:    /app/certs
      ZTE_OBO_SECRET:   ${ZTE_OBO_SECRET:-zte-obo-dev-secret-change-in-production}
      SERVICE_B_URI:    https://service-b:8082
    ports:
      - "8081:8081"   # HTTPS + mTLS (API)
      - "9081:9081"   # HTTP (management / health probe)
    volumes:
      - ./certs:/app/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - service-b
    networks:
      - zte-net

  # ── Service B (second protected service — validates OBO token) ────
  service-b:
    build:
      context: .
      dockerfile: service-b/Dockerfile
    container_name: zte-service-b
    restart: unless-stopped
    environment:
      ZTE_CERTS_DIR:  /app/certs
      ZTE_OBO_SECRET: ${ZTE_OBO_SECRET:-zte-obo-dev-secret-change-in-production}
    ports:
      - "8082:8082"   # HTTPS + mTLS (API)
      - "9082:9082"   # HTTP (management / health probe)
    volumes:
      - ./certs:/app/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - zte-net

