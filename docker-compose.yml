version: "3.9"

# ============================================================
# ZTE-Lightweight — Local Development Infrastructure
# ============================================================
# Services:
#   postgres  — Primary database (port 5432)
#   keycloak  — OIDC provider in dev mode (port 8180)
#
# Usage:
#   docker compose up -d
#   ./setup-env.sh          ← verifies containers are healthy
# ============================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: zte-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       zte_db
      POSTGRES_USER:     zte_user
      POSTGRES_PASSWORD: zte_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zte_user -d zte_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - zte-net

  # ── Keycloak (dev mode — NOT for production) ─────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: zte-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB:                     dev-file   # in-memory file DB for dev mode
      KEYCLOAK_ADMIN:            admin
      KEYCLOAK_ADMIN_PASSWORD:   admin
      KC_HTTP_PORT:              8080
      KC_HOSTNAME_STRICT:        "false"
      KC_HOSTNAME_STRICT_HTTPS:  "false"
      KC_LOG_LEVEL:              INFO
    ports:
      - "8180:8080"    # expose on 8180 to avoid conflict with gateway (8080)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - zte-net

